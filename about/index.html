document.addEventListener('DOMContentLoaded', function() {
  const colorPicker = document.getElementById('theme-color-picker');
  const root = document.documentElement;
  
  // 初始化颜色选择器的UI显示值
  const savedColor = localStorage.getItem('custom-accent-color');
  if (savedColor) {
    colorPicker.value = savedColor;
  }

  // 监听：颜色面板拖动时（实时更新整个网站的颜色）
  colorPicker.addEventListener('input', function(e) {
    const newColor = e.target.value;
    root.style.setProperty('--accent-color', newColor);
    
    // ★ 修复 Bug：如果在 iframe 模态框中修改颜色，实时同步给主窗口(父界面)
    if (window.self !== window.top) {
      try {
        window.top.document.documentElement.style.setProperty('--accent-color', newColor);
        const parentPicker = window.top.document.getElementById('theme-color-picker');
        if (parentPicker) parentPicker.value = newColor;
      } catch(err) {
        // 忽略跨域错误
      }
    }
  });

  // 监听：颜色选择完毕关闭面板时（保存到浏览器缓存，下次打开依然有效）
  colorPicker.addEventListener('change', function(e) {
    const newColor = e.target.value;
    localStorage.setItem('custom-accent-color', newColor);
  });

  // ★ 修复 Bug：监听 localStorage 变化。如果主页颜色改变，通知到所有开启的模态框 iframe 或者 其他标签页
  window.addEventListener('storage', function(e) {
    if (e.key === 'custom-accent-color' && e.newValue) {
      root.style.setProperty('--accent-color', e.newValue);
      if (colorPicker) colorPicker.value = e.newValue;
    }
  });
});</script><div class="search-overlay"><div class="search-container"><div class="search-form"><input class="search-input" type="text" placeholder="搜索文章..."/><div class="search-close">×</div></div><div class="search-results"></div></div></div><main class="main"><div class="post-wrapper"><div class="toc-sidebar"><div class="toc-container"><div class="toc-title">目录</div><div class="toc-content" id="table-of-contents"><!-- Table of contents will be generated by JavaScript--></div></div></div><article class="post-container"><div class="post-header"><div class="post-meta"><div class="post-date"><time datetime="2026-07-21T03:02:11.000Z">七月 21, 2026</time></div></div><h1 class="post-title">about</h1></div><div class="post-content"><p>介绍自己吗？但是了解自己本身就是一项艰辛、久远的工作呢，我在这方面还まだまだだ，要我自我介绍的话，看来只能下一次了呢。</p>
